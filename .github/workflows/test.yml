name: test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1.22
        with:
          version: 0.10.3

      - name: moon check
        run: moon check

      - name: moon fmt --deny-warn
        run: moon fmt --deny-warn

      - name: moon info --deny-warn
        run: moon info --deny-warn

      - name: moontest
        run: moon test
